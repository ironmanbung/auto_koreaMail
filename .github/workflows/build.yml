name: Build EXE and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 패키지 설치
        run: |
          pip install PyQt6 openpyxl pyautogui pyperclip pyinstaller

      - name: EXE 빌드
        run: |
          pyinstaller --noconfirm --onefile --windowed --collect-all PyQt6 "auto-mail_pqt6_DragDrop_fin.py"

      - name: Releases에 EXE 업로드
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
